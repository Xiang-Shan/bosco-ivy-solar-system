  <script>
    // Silence harmless ResizeObserver loop warnings at the earliest possible point
    window.addEventListener('error', function(e) {
      if (e.message && e.message.indexOf('ResizeObserver') !== -1) {
        e.stopImmediatePropagation();
        e.preventDefault();
        return false;
      }
    }, true);
  </script>

      <!-- Saturn with ring -->
      <ellipse cx="100" cy="38" rx="9" ry="2" fill="none" stroke="rgba(212,180,130,0.7)" stroke-width="1"/>

    </svg>
  </template>

  <div id="root"></div>

  <script>
    // Suppress harmless ResizeObserver loop warnings at every level
    (function() {
      const OrigRO = window.ResizeObserver;
      if (OrigRO) {
        window.ResizeObserver = class extends OrigRO {
          constructor(cb) {
            super((entries, obs) => {
              requestAnimationFrame(() => { try { cb(entries, obs); } catch(e){} });
            });
          }
        };
      }
      const handler = (e) => {
        const msg = e.message || (e.error && e.error.message) || '';
        if (msg.indexOf('ResizeObserver') !== -1) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      };
      window.addEventListener('error', handler, true);
      window.addEventListener('unhandledrejection', handler, true);
      const origError = console.error;
      console.error = function(...args) {
        const s = args.map(a => String(a)).join(' ');
        if (s.indexOf('ResizeObserver') !== -1) return;
        return origError.apply(this, args);
      };
    })();
  </script>
